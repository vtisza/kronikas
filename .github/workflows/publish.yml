name: Publish and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write  # required for OIDC trusted publishing
  contents: write  # required for creating GitHub releases

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for setuptools_scm version derivation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Update CITATION.cff version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TODAY=$(date +'%Y-%m-%d')
          sed -i -e "s/^version: .*/version: ${VERSION}/" CITATION.cff
          sed -i -e "s/^date-released: .*/date-released: \"${TODAY}\"/" CITATION.cff
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          if ! git diff --staged --quiet; then
            git commit -m "docs: update CITATION.cff version to ${VERSION} [skip ci]"
            git push origin HEAD:main
          fi
